name: Generate Plugins and Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/generate.js"
      - ".github/workflows/deploy.yml"
      - "docs/api/**"
      - "plugins/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-plugins:
    if: github.repository == 'HdShare/WAuxiliary_Plugin'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build VitePress
        run: npm run docs:build

      - name: Commit Generated
        if: success()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.json docs/index.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "文档: 构建插件列表文档"
            git push origin HEAD:main
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.repository == 'HdShare/WAuxiliary_Plugin'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: generate-plugins
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
